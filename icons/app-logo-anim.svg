<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <style>
    :root {
      --anim: 5s linear infinite;
    }

    .line {
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      animation: var(--anim);
    }

    .invisible {
      opacity: 0;
    }

    #circle {
      stroke-dasharray: 22.6 2 1.4 2 1.4 2;
      mask: url(#circle-draw-mask);
    }

    #circle-mask-stroke {
      stroke: #fff;
      stroke-dasharray: 0 31.14;
      animation-name: circle-reveal-cycle;
    }

    #pen {
      fill: currentColor;
      animation: var(--anim);
      animation-name: pen-opacity-cycle;
    }

    #hour {
      transform: rotate(60deg);
      animation-name: hour;
    }

    #minute {
      transform: rotate(120deg);
      animation-name: minute;
    }

    @keyframes circle-reveal-cycle {
      0% {
        animation-timing-function: ease-in;
      }

      5%,
      85% {
        opacity: 1;
      }

      25%,
      70% {
        stroke-dasharray: 31.14 0;
      }

      70% {
        animation-timing-function: ease-out;
      }

      90%,
      100% {
        stroke-dasharray: 0 31.14;
        opacity: 0;
      }
    }

    @keyframes pen-opacity-cycle {

      0%,
      5%,
      75%,
      100% {
        opacity: 0;
      }

      40%,
      65% {
        opacity: 1;
      }
    }

    @keyframes minute {

      70%,
      90% {
        transform: rotate(840deg);
      }

      90%,
      100% {
        transform: rotate(480deg);
      }
    }

    @keyframes hour {
      70% {
        transform: rotate(120deg);
      }

      75%,
      100% {
        transform: rotate(60deg);
      }
    }
  </style>

  <defs>
    <path id="circle-shape" pathLength="31.14" d="M8 15a7 7 0 1 1 7-7" />

    <mask id="circle-draw-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="16" height="16">
      <use class="line" id="circle-mask-stroke" href="#circle-shape" />
    </mask>
  </defs>

  <use class="line" id="circle" href="#circle-shape" />

  <path class="invisible" id="pen"
    d="m15.05 10.19-1.3-.9a1 1 0 0 0-1.4.25l-2.1 3a.8.8 0 0 0-.15.45l.05 1.75a.7.7 0 0 0 1 .7l1.65-.54a.8.8 0 0 0 .4-.3l2.1-3a1 1 0 0 0-.25-1.41Zm-2.76 4.06-1.4-.95 2.05-2.95a.4.4 0 0 1 .55-.1l.75.5a.4.4 0 0 1 .1.55Z" />

  <line class="line" id="hour" x1="50%" y1="50%" x2="50%" y2="33%" />
  <line class="line" id="minute" x1="50%" y1="50%" x2="50%" y2="28%" />
</svg>